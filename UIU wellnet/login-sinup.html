<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login or SinUp</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google font -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
     <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body> 
    <div class="main_container">
        <div class="leftdiv">
          <div class="login"> 
                <a href="index.html">
                    <img src="asset/images/wellnet-logo.png" alt="">
                </a>
                <p>Welcome back</p>

                <form class="left-form">
                     <label>ID / Username</label>
                     <input type="text" placeholder="Enter your ID or username">

                     <label>Password</label>
                     <input type="password" placeholder="Enter your password">

                
                     <div class="options">
                         <label class="checkbox">
                            <input type="checkbox"> 
                            <span>Remember me</span>
                          </label>
                         <a href="#">Forgot password?</a>
                     </div>
                        <button class="login-btn">Login</button>
                     
                </form>

                <p class="signup-text">Don't have an account? <a href="student-dashboard.html">Sign up now</a></p>

          </div>

        
        
         </div>

        <div class="rightdiv">
             <div class="create-account-text">
             <h2>Create Account</h2>
             <p class="subtitle">Join UIU WellNet today</p>
             </div>

            <form class="right-form">
                <div class="form-field">
                    <label>Full Name</label>
                    <input type="text" placeholder="Enter your name">
                </div>

                <div class="form-field">
                    <label>ID / Username</label>
                    <input type="text" placeholder="Enter ID or username">
                </div>

                <div class="form-field">
                    <label>Email</label>
                    <input type="email" placeholder="example@gmail.com">
                </div>

                <div class="form-field">
                     <label>Phone Number</label>
                     <input type="text" placeholder="+880 XXX-XXXXXXX">
                </div>     

                <div class="form-field">
                    <label>Blood Group</label>
                     <input type="text" placeholder="e.g. A+">
                </div>

                <div class="form-field">
                   <label>Age</label>
                   <input type="number" placeholder="Enter age">
                </div>

                <!-- <div class="form-field"> -->
                  <!-- <label>Weight (kg)</label> -->
                  <!-- <input type="number" placeholder="Enter weight"> -->
                <!-- </div> -->

                <div class="form-field">

                   <label>Gender</label>
                   <input type="text" placeholder="Enter gender">
                 </div>

                <!-- <div class="form-field"> -->
                   <!-- <label>Emergency Contact</label> -->
                   <!-- <input type="text" placeholder="+880 XXX-XXXXXXX"> -->
                <!-- </div>  -->

                <div class="form-field">

                  <label>Doctor Code</label>
                  <input type="text" placeholder="Dr- XXX - XX">
  
                </div>

                 <div class="form-field">
                     <label>Address</label>
                    <textarea placeholder="Address"></textarea>

                 </div>

                <div class="upload-box">
                     Click to upload profile image
                 </div>

                 
             </form>
              <button class="create-btn">Create Account</button>

         </div>
    </div>
    
</body>
</html>
